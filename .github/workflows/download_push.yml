name: Download and Push File

on:
    workflow_dispatch: 

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Important: Use the token to push back to the repo
        token: ${{ secrets.GH_TOKEN }}
        ssh-user: 'mammadnet'
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install -r requirements.txt --upgrade pip
    
    - name: Run download script
      run: python3 audio_downloader.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "moohamadiann@gmail.com"
        git config --local user.name "Mohsen"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Update downloaded file [skip ci]"
        git push
