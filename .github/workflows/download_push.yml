name: Download and Push File

on:
    workflow_dispatch: 

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Important: Use the token to push back to the repo
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install -r requirements.txt --upgrade pip
        
    - name: Debug API_ID
      run: |
       echo "API_ID value: '${{ vars.API_ID }}'"  
       echo "API_ID from secrets: '${{ secrets.API_ID }}'"
      
    - name: Run download script
      env:
            SESSION_STR: ${{ secrets.SESSION_STR }}
            API_ID: ${{ secrets.API_ID }}
            API_HASH: ${{ secrets.API_HASH }}
            CHANNEL_USERNAME: ${{ vars.CHANNEL_USERNAME }}
            DOWNLOAD_PATH: ${{ vars.DOWNLOAD_PATH }}
            DATA_FILE_PATH: ${{ vars.DATA_FILE_PATH }}
            DATE_FORMAT: ${{ vars.DATE_FORMAT }}
            LOAD_START_DATE: ${{ vars.LOAD_START_DATE }}
            DURATION_LIMIT: ${{ vars.DURATION_LIMIT }}
            MIN_MSG_ID: ${{ vars.MIN_MSG_ID }}
            DATA_FETCH_LIMIT: ${{ vars.DATA_FETCH_LIMIT }}
            FILENAME_PATTERN: ${{ vars.FILENAME_PATTERN }}
            
      run: python3 audio_downloader.py
    
    - name: Commit and push changes
      run: |
        git config --local user.email "moohamadiann@gmail.com"
        git config --local user.name "Mohsen"
        git add .
        git diff --quiet && git diff --staged --quiet || git commit -m "Update downloaded file [skip ci]"
        git push
